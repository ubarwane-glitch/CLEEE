<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page non trouvée - Clelim Serrurerie</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #022348 0%, #034078 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    h1 {
      font-size: clamp(4rem, 15vw, 8rem);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 1rem;
      color: #FFC801;
    }
    h2 {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      font-weight: 700;
      margin-bottom: 1rem;
    }
    p {
      font-size: 1.125rem;
      opacity: 0.9;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #FFC801;
      color: #022348;
    }
    .btn-primary:hover {
      background: #FFD433;
      transform: translateY(-2px);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page non trouvée</h2>
    <p>La page que vous recherchez n'existe pas ou a été déplacée. Retournez à l'accueil ou contactez-nous directement pour une urgence.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">← Retour à l'accueil</a>
      <a href="tel:+33677235839" class="btn btn-secondary">📞 Appeler maintenant</a>
    </div>
  </div>
</body>
</html>
